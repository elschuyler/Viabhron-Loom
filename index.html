<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Viabhron Loom</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#000000">
</head>
<body class="celestial-bg">
    <div class="star-field"></div>
    
    <header class="top-nav">
        <button class="nav-btn active" data-target="world-root">World Root</button>
        <button class="nav-btn" data-target="life-seed">Life Seed</button>
        <button class="nav-btn" data-target="soul-weaver">Soul Weaver</button>
        <button class="nav-btn" data-target="world-pulse">World Pulse</button>
    </header>

    <main class="loom-container">
        <!-- WORLD ROOT -->
        <section id="world-root" class="form-mode active">
            <h2 class="glow-text">World Root</h2>
            <div class="input-group">
                <label>Root ID</label>
                <input type="text" id="root-id" placeholder="e.g. IRON_VALLEY_X9">
            </div>
            <div class="input-group">
                <label>Seed</label>
                <input type="text" id="root-seed" placeholder="Celestial Coordinate 0.992">
            </div>
            <div class="input-group">
                <label>Architecture Type</label>
                <input type="text" id="root-arch" list="dl-architecture" placeholder="Knit Architecture...">
                <datalist id="dl-architecture"></datalist>
            </div>
            <div class="input-group">
                <label>Environment Vibe</label>
                <input type="text" id="root-vibe" list="dl-env-vibe" placeholder="Knit Environment...">
                <datalist id="dl-env-vibe"></datalist>
            </div>
            <div class="input-group">
                <label>Connections</label>
                <textarea id="root-connections" placeholder="e.g. VALLEY_NORTH, ABYSS_01, SKY_ANCHOR_04"></textarea>
            </div>
        </section>

        <!-- LIFE SEED -->
        <section id="life-seed" class="form-mode">
            <h2 class="glow-text">Life Seed</h2>
            <div class="input-group">
                <label>Seed ID</label>
                <input type="text" id="seed-id" placeholder="ENTITY_HASH_77">
            </div>
            <div class="input-group">
                <label>Entity Name</label>
                <input type="text" id="seed-name" placeholder="Name the entity...">
            </div>
            <div class="input-group">
                <label>World Origin</label>
                <input type="text" id="seed-origin" list="dl-origin" placeholder="Knit Origin...">
                <datalist id="dl-origin"></datalist>
            </div>
            <div class="input-group">
                <label>Vibe Check & Behavior</label>
                <textarea id="seed-behavior" placeholder="Docile until light touches its core..."></textarea>
            </div>
            <div class="stats-row">
                <div class="input-group">
                    <label>STR</label>
                    <input type="number" id="stats-str" value="10">
                </div>
                <div class="input-group">
                    <label>DEF</label>
                    <input type="number" id="stats-def" value="10">
                </div>
                <div class="input-group">
                    <label>AGI</label>
                    <input type="number" id="stats-agi" value="10">
                </div>
            </div>
        </section>

        <!-- SOUL WEAVER -->
        <section id="soul-weaver" class="form-mode">
            <h2 class="glow-text">Soul Weaver</h2>
            <div class="input-group">
                <label>Soul ID</label>
                <input type="text" id="soul-id" placeholder="SOUL_REF_ALPHA">
            </div>
            <div class="input-group">
                <label>Role</label>
                <input type="text" id="soul-role" list="dl-role" placeholder="Knit Role...">
                <datalist id="dl-role"></datalist>
            </div>
            <div class="input-group">
                <label>Drive Code</label>
                <input type="text" id="soul-drive" list="dl-drive" placeholder="Knit Drive...">
                <datalist id="dl-drive"></datalist>
            </div>
            <div class="input-group">
                <label>Trauma Code</label>
                <input type="text" id="soul-trauma" list="dl-trauma" placeholder="Knit Trauma...">
                <datalist id="dl-trauma"></datalist>
            </div>
            <div class="input-group">
                <label>Personality Hex</label>
                <input type="text" id="soul-hex" maxlength="4" placeholder="F001">
            </div>
            <div class="input-group">
                <label>Scribe Summon Class</label>
                <input type="text" id="soul-class" placeholder="Void Caller / Star Reacher">
            </div>
        </section>

        <!-- WORLD PULSE -->
        <section id="world-pulse" class="form-mode">
            <h2 class="glow-text">World Pulse</h2>
            <div class="input-group">
                <label>Region ID</label>
                <input type="text" id="pulse-id" placeholder="EPICENTER_0">
            </div>
            <div class="input-group">
                <label>Power Structure</label>
                <input type="text" id="pulse-power" list="dl-power" placeholder="Knit Power Schema...">
                <datalist id="dl-power"></datalist>
            </div>
            <div class="input-group">
                <label>Trade Vines & Currency</label>
                <textarea id="pulse-trade" placeholder="Loom Shards and Celestial Favors..."></textarea>
            </div>
            <div class="input-group">
                <label>Societal Taboos</label>
                <textarea id="pulse-taboos" placeholder="Never speak of the Weaver..."></textarea>
            </div>
            <div class="input-group">
                <label>Atmospheric Current</label>
                <textarea id="pulse-current" placeholder="90% Ozone, 10% Magic Drift..."></textarea>
            </div>
        </section>

        <footer class="action-bar">
            <button id="knit-btn" class="main-btn knit">Knit Data</button>
            <button id="clear-btn" class="main-btn clear">Clear Loom</button>
        </footer>
    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
