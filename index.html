<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Viabhron Loom</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.3);
            --bg-dark: #060608;
            --panel-bg: rgba(10, 15, 20, 0.95);
            --grid-line: rgba(0, 242, 255, 0.07);
            --text-main: #e0f8ff;
            --text-muted: #6b8a99;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-main);
            padding: 12px;
            min-height: 100vh;
        }

        /* Technical Grid & Node Aesthetic */
        .loom-container {
            background: var(--panel-bg);
            border: 1px solid var(--cyan);
            box-shadow: 0 0 15px var(--cyan-glow), inset 0 0 20px rgba(0, 242, 255, 0.05);
            border-radius: 4px;
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
        }

        .loom-container::before, .loom-container::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyan);
        }
        .loom-container::before { top: 4px; left: 4px; }
        .loom-container::after { top: 4px; right: 4px; }

        header {
            border-bottom: 1px solid var(--cyan);
            padding: 16px;
            text-align: center;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.1), transparent);
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--cyan);
        }

        /* Mode Switcher */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--cyan);
            border-bottom: 1px solid var(--cyan);
        }

        .nav-btn {
            background: var(--panel-bg);
            color: var(--text-muted);
            border: none;
            padding: 14px 8px;
            font-size: 0.9rem;
            font-weight: bold;
            min-height: 48px; /* Mobile touch target */
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-btn.active {
            color: var(--cyan);
            background: rgba(0, 242, 255, 0.05);
            text-shadow: 0 0 5px var(--cyan-glow);
            box-shadow: inset 0 -3px 0 var(--cyan);
        }

        /* Forms */
        .mode-section {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .mode-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--cyan);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--text-main);
            padding: 12px;
            min-height: 48px;
            font-size: 1rem;
            outline: none;
            border-radius: 2px;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 8px var(--cyan-glow);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Action Controls */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            padding: 20px;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
        }

        button.action-btn {
            min-height: 54px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
        }

        .btn-reset {
            background: transparent;
            color: #ff4a4a;
            border: 1px solid #ff4a4a;
        }

        .btn-knit {
            background: rgba(0, 242, 255, 0.1);
            color: var(--cyan);
            border: 1px solid var(--cyan);
            box-shadow: inset 0 0 10px var(--cyan-glow);
        }

        .btn-knit:active {
            background: var(--cyan);
            color: var(--bg-dark);
        }

        /* Circuit line accents */
        .circuit-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            margin: 10px 0;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="loom-container">
    <header>
        <h1>The Viabhron Loom</h1>
    </header>

    <nav class="nav-grid">
        <button class="nav-btn active" onclick="switchMode('world-root')">World Root</button>
        <button class="nav-btn" onclick="switchMode('life-seed')">Life Seed</button>
        <button class="nav-btn" onclick="switchMode('soul-weaver')">Soul Weaver</button>
        <button class="nav-btn" onclick="switchMode('world-pulse')">World Pulse</button>
    </nav>

    <section id="world-root" class="mode-section active">
        <div class="input-group">
            <label>Root ID</label>
            <input type="text" id="root-id" data-save="true" placeholder="e.g. root_001">
        </div>
        <div class="input-group">
            <label>Generation Seed</label>
            <input type="text" id="root-seed" data-save="true" placeholder="Alphanumeric string">
        </div>
        <div class="circuit-line"></div>
        <div class="input-group">
            <label>Architecture</label>
            <select id="root-arch" data-save="true">
                <option value="Forest">Forest</option>
                <option value="Swamp">Swamp</option>
                <option value="Ruins">Ruins</option>
                <option value="Void">Void</option>
            </select>
        </div>
        <div class="input-group">
            <label>Connections (Paths/Portals)</label>
            <textarea id="root-conn" data-save="true" placeholder="List connected nodes..."></textarea>
        </div>
    </section>

    <section id="life-seed" class="mode-section">
        <div class="input-group">
            <label>Monster ID</label>
            <input type="text" id="life-id" data-save="true" placeholder="e.g. mon_alpha">
        </div>
        <div class="input-group">
            <label>Base Stats</label>
            <input type="text" id="life-stats" data-save="true" placeholder="HP:10 ATK:5 DEF:2">
        </div>
        <div class="circuit-line"></div>
        <div class="input-group">
            <label>World/Env Type</label>
            <input type="text" id="life-env" data-save="true" placeholder="Biome preference">
        </div>
        <div class="input-group">
            <label>Behavioral Personality</label>
            <textarea id="life-pers" data-save="true" placeholder="Aggressive, passive, territorial..."></textarea>
        </div>
    </section>

    <section id="soul-weaver" class="mode-section">
        <div class="input-group">
            <label>Character ID</label>
            <input type="text" id="soul-id" data-save="true" placeholder="e.g. char_main">
        </div>
        <div class="input-group">
            <label>Drive / Trauma Codes</label>
            <input type="text" id="soul-drive" data-save="true" placeholder="Primary motivators">
        </div>
        <div class="circuit-line"></div>
        <div class="input-group">
            <label>Personality Hex</label>
            <input type="text" id="soul-hex" data-save="true" placeholder="6-point stat spread">
        </div>
        <div class="input-group">
            <label>Scribe Summon Class</label>
            <input type="text" id="soul-class" data-save="true" placeholder="Class designation">
        </div>
    </section>

    <section id="world-pulse" class="mode-section">
        <div class="input-group">
            <label>Sector ID</label>
            <input type="text" id="pulse-id" data-save="true" placeholder="e.g. sec_tradehub">
        </div>
        <div class="input-group">
            <label>Geopolitics / Local Power</label>
            <textarea id="pulse-power" data-save="true" placeholder="Factions in control..."></textarea>
        </div>
        <div class="circuit-line"></div>
        <div class="input-group">
            <label>Trade Vines (Currency Logic)</label>
            <textarea id="pulse-trade" data-save="true" placeholder="Primary exports/imports..."></textarea>
        </div>
        <div class="input-group">
            <label>Local Laws</label>
            <textarea id="pulse-laws" data-save="true" placeholder="Strictness, taboos..."></textarea>
        </div>
    </section>

    <div class="action-grid">
        <button class="action-btn btn-reset" onclick="resetForm()">Purge</button>
        <button class="action-btn btn-knit" onclick="knitData()">Knit JSON</button>
    </div>
</div>

<script>
    // System State
    let currentMode = 'world-root';

    // 1. Navigation Logic
    function switchMode(modeId) {
        document.querySelectorAll('.mode-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(modeId).classList.add('active');
        event.currentTarget.classList.add('active');
        currentMode = modeId;
    }

    // 2. Persistence Logic (localStorage)
    function saveState() {
        const inputs = document.querySelectorAll('[data-save="true"]');
        const data = {};
        inputs.forEach(input => {
            data[input.id] = input.value;
        });
        localStorage.setItem('viabhron_loom_data', JSON.stringify(data));
    }

    function loadState() {
        const saved = localStorage.getItem('viabhron_loom_data');
        if (saved) {
            const data = JSON.parse(saved);
            Object.keys(data).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = data[id];
            });
        }
    }

    // Attach listeners for auto-save
    document.querySelectorAll('[data-save="true"]').forEach(input => {
        input.addEventListener('input', saveState);
    });

    // 3. Reset Logic
    function resetForm() {
        const activeSection = document.getElementById(currentMode);
        const inputs = activeSection.querySelectorAll('[data-save="true"]');
        inputs.forEach(input => input.value = '');
        saveState(); // Update storage
    }

    // 4. Data Extraction & Download Logic
    function knitData() {
        const activeSection = document.getElementById(currentMode);
        const inputs = activeSection.querySelectorAll('[data-save="true"]');
        
        let jsonObject = {
            mode: currentMode,
            timestamp: new Date().toISOString()
        };

        let fileId = 'unknown';

        inputs.forEach(input => {
            const key = input.id.split('-')[1]; // e.g. 'root-id' becomes 'id'
            jsonObject[key] = input.value;
            
            // Look for the ID field to name the file
            if (key === 'id' && input.value.trim() !== '') {
                fileId = input.value.trim().replace(/[^a-z0-9_]/gi, '-');
            }
        });

        // Format filename: [mode]_[id].json
        const filename = `${currentMode}_${fileId}.json`;
        
        // Trigger Download
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(jsonObject, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", filename);
        document.body.appendChild(downloadAnchorNode); 
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    // Initialize on load
    window.onload = loadState;
</script>

</body>
  </html>
